<title>Claude Compile</title>

<style>
:root{
  --bg:#f4f1e9; --paper:#fcfaf4; --ink:#33302a; --sub:#9b9384; --faint:#c3bbab;
  --line:#e7e0d1; --hair:#ece6d8; --akane:#a13c3c; --ai:#3c5a78; --moss:#5e7a58;
  --dot-bg:#e4dccb;
  --halo:rgba(244,241,233,.96); --halo0:rgba(244,241,233,0);
  --hm-n:#ebe4d6; --hm-1:#bcd3ab; --hm-2:#94b884; --hm-3:#6f9963; --hm-4:#5e7a58;
}
/* 和纸夜版：暖深炭底 + 柔米白字，点缀色提亮保对比 */
:root[data-theme="dark"]{
  --bg:#1a1613; --paper:#241f1a; --ink:#e7ddcc; --sub:#9a8e7c; --faint:#6b6253;
  --line:#39322b; --hair:#322c25; --akane:#d77f72; --ai:#82a8cb; --moss:#8bb079;
  --dot-bg:#3a332b;
  --halo:rgba(36,31,26,.95); --halo0:rgba(36,31,26,0);
  --hm-n:#2b2520; --hm-1:#46663a; --hm-2:#5d8a4c; --hm-3:#77a862; --hm-4:#8fc079;
}
html{transition:background-color .35s ease}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans GB","PingFang SC","Noto Sans CJK SC",sans-serif;
  font-size:15px;line-height:1.9;letter-spacing:.025em}

.layout{max-width:1280px;margin:0 auto;padding:42px 36px 90px;
  display:grid;grid-template-columns:184px 340px 1fr;gap:44px}
@media(max-width:1120px){.layout{grid-template-columns:1fr;gap:8px;padding:28px 22px 70px}}

/* ── 左栏 / 中栏 ── */
aside{position:sticky;top:38px;align-self:start}
@media(max-width:1120px){aside{position:static;margin-bottom:8px}}
@media(max-width:1120px){aside.rail{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding-bottom:14px;border-bottom:1px solid var(--hair)}}
/* 中栏：坚持(热力图+近十天) */
aside.track{min-width:0}
@media(max-width:1120px){aside.track{border-bottom:1px solid var(--hair);padding-bottom:18px}}
.ddaywrap{padding:4px 0 30px 0}
.kicker{font-size:11px;letter-spacing:.5em;color:var(--sub);font-weight:600}
.dday{font-family:"Noto Serif CJK SC",Georgia,serif;margin:10px 0 0;line-height:1}
.dday b{font-size:40px;font-weight:700;color:var(--akane);letter-spacing:-.02em}
.dday i{font-style:normal;font-size:11px;color:var(--akane);letter-spacing:.2em;margin-left:4px}
.warn{font-size:12px;font-weight:600;letter-spacing:.5em;color:var(--akane);
  margin-top:11px;padding-top:9px;border-top:2px solid var(--akane);display:inline-block}
@media(max-width:780px){.ddaywrap{padding:0}}
.stat{font-size:12.5px;color:var(--sub);letter-spacing:.05em;margin:30px 0 12px}
.stat b{color:var(--ink);font-weight:600}
@media(max-width:780px){.dday{margin:0}.dday b{font-size:34px}.warn{margin-top:0}.stat{margin:0}}
.dots{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;max-width:172px;margin-top:4px}
.dots .d{aspect-ratio:1;border-radius:5px;background:var(--dot-bg);color:var(--sub);
  font-family:Georgia,serif;font-size:10.5px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .15s,background .2s}
.dots .d:hover{transform:scale(1.18)}
.dots .d.ok{background:var(--moss);color:#fff} .dots .d.no{background:var(--akane);color:#fff}
.dots .d.pending{background:var(--dot-bg);color:var(--sub)}
.plan{font-size:11.5px;color:var(--ai);letter-spacing:.08em;margin:24px 0 6px;line-height:1.95}
.plan .ph{display:inline-block;font-size:10px;letter-spacing:.2em;color:var(--moss);
  border:1px solid var(--moss);border-radius:3px;padding:1px 6px;margin-bottom:5px}
.plan b{color:var(--ink);font-weight:600}
.hint{font-size:10.5px;color:var(--faint);letter-spacing:.2em;margin-top:22px}
@media(max-width:780px){.hint{display:none}}

/* ── 题流 ── */
main{min-width:0}
/* 历史导航：手绘风左右箭头(过 #sketch 滤镜抖成手绘味)，键盘 ←/→ 翻日；sticky 悬浮于正文顶部 */
.daynav{position:sticky;top:4px;z-index:30;display:flex;justify-content:space-between;align-items:center;
  height:60px;margin:-8px -14px 4px;pointer-events:none}
.dayarrow{pointer-events:auto;width:86px;height:64px;padding:0;border:none;cursor:pointer;
  color:var(--ink);display:grid;place-items:center;border-radius:40px;
  background:radial-gradient(ellipse 60% 70% at center,var(--halo) 55%,var(--halo0) 78%);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .2s,opacity .15s}
.dayarrow svg{width:78px;height:57px;display:block;overflow:visible;filter:url(#sketch);transition:transform .15s ease}
.dayarrow:hover{color:var(--akane)}
.dayarrow.left:hover svg{transform:translateX(-4px) scale(1.06)}
.dayarrow.right:hover svg{transform:translateX(4px) scale(1.06)}
.dayarrow.press{transform:scale(.74) translateY(4px);opacity:.5;color:var(--akane);transition-duration:.08s}
.dayarrow.gone{visibility:hidden;pointer-events:none}
.stitle{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.stitle::before{content:"";align-self:center;width:3px;height:15px;background:var(--akane)}
.stitle h2{font-family:"Noto Serif CJK SC",serif;font-size:16px;font-weight:600;letter-spacing:.2em}
.stitle small{color:var(--sub);font-size:12px;letter-spacing:.1em}
#daytitle{margin-top:48px}
.grouphd{font-family:"Noto Serif CJK SC",serif;font-size:14px;letter-spacing:.14em;
  color:var(--ink);margin:0 0 32px;padding-bottom:10px;border-bottom:2px solid var(--moss);
  display:flex;align-items:baseline;gap:12px}
.grouphd:not(:first-child){margin-top:64px}
.grouphd small{font-size:11px;color:var(--sub);letter-spacing:.08em;font-family:inherit;font-weight:400}
.qblock{padding:0 0 44px;margin-bottom:44px;border-bottom:1px solid var(--hair)}
.qblock:last-child{border-bottom:none}
.qmeta{font-family:"Noto Serif CJK SC",serif;font-size:12px;letter-spacing:.22em;
  color:var(--faint);margin-bottom:18px}
.qmeta b{color:var(--sub);font-weight:600}
/* 宽度由后端 dispW 按“字号一致”算好(见 tools/imgnorm.py)，故按原生比例显示而非铺满；
   max-width:100% 仅作超宽表格的兜底，避免溢出主栏 */
.qimg{width:auto;max-width:100%;height:auto;display:block;border-radius:3px}

.opts{margin-top:20px;max-width:560px;display:flex;gap:10px}
.opt{width:46px;height:33px;display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-size:14px;color:var(--sub);
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  cursor:pointer;transition:all .16s;user-select:none}
.opt:hover{border-color:var(--ai);color:var(--ai)}
.opt.ok{background:var(--moss);border-color:var(--moss);color:#fff}
.opt.no{background:var(--akane);border-color:var(--akane);color:#fff}
.opt.pick{border-color:var(--ai);color:var(--ai);box-shadow:inset 0 0 0 1px var(--ai)}
.opts.locked .opt{cursor:default}.opts.locked .opt:hover{border-color:var(--line);color:var(--sub)}
.opts.locked .opt.ok:hover{border-color:var(--moss);color:#fff}
.opts.locked .opt.no:hover{border-color:var(--akane);color:#fff}

.fb{margin-top:16px;min-height:24px;display:flex;align-items:center;gap:16px;font-size:13.5px}
.verdict{font-family:"Noto Serif CJK SC",serif;letter-spacing:.12em}
.verdict.ok{color:var(--moss)} .verdict.no{color:var(--akane)}
.verdict .ans{color:var(--sub);font-family:inherit;margin-left:10px;letter-spacing:.05em}
.ask{color:var(--sub)}
.sj{font:inherit;font-size:12.5px;letter-spacing:.1em;cursor:pointer;color:var(--ai);
  background:none;border:1px solid var(--line);border-radius:5px;padding:5px 16px;transition:all .18s}
.sj:hover{border-color:var(--ai);background:var(--ai);color:var(--paper)}
.sj:disabled{opacity:.4;cursor:default;border-color:var(--line);background:none;color:var(--sub)}

.done-tag{font-size:12px;letter-spacing:.15em;color:var(--faint)}
.done-tag.ok{color:var(--moss)} .done-tag.no{color:var(--akane)}

/* ── 战况诊断面板 ── */
.stats-toggle{display:inline-grid;place-items:center;margin-top:28px;margin-left:28px;
  padding:0 22px;height:50px;border:none;cursor:pointer;color:var(--ink);
  border-radius:30px;background:var(--paper);
  box-shadow:0 3px 12px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.06);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .2s,box-shadow .2s}
.stats-toggle:hover{color:var(--akane);transform:scale(1.06);box-shadow:0 5px 18px rgba(0,0,0,.13),0 2px 6px rgba(0,0,0,.07)}
.stats-toggle svg{display:block;overflow:visible;filter:url(#sketch)}
.stats-toggle.press{transform:scale(.74) translateY(4px);opacity:.5;color:var(--akane);transition-duration:.08s}
.sect{margin-bottom:42px}
.sect h3{font-family:"Noto Serif CJK SC",serif;font-size:14px;letter-spacing:.18em;color:var(--ink);
  margin-bottom:18px;padding-bottom:7px;border-bottom:2px solid var(--moss);display:inline-block}
.proj{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
.proj b{font-family:"Noto Serif CJK SC",serif;font-size:46px;color:var(--akane);font-weight:700;line-height:1}
.proj .full{font-size:13px;color:var(--sub)} .proj .tgt{font-size:12px;color:var(--moss);letter-spacing:.1em}
.bar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12.5px;max-width:560px}
.bar .lab{width:150px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;height:8px;background:var(--hair);border-radius:4px;overflow:hidden}
.bar .fill{height:100%;background:var(--ai);border-radius:4px;transition:width .4s}
.bar .fill.weak{background:var(--akane)} .bar .fill.good{background:var(--moss)}
.bar .val{width:84px;text-align:right;color:var(--sub);font-family:Georgia,serif;font-size:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{font-size:11.5px;color:var(--akane);border:1px solid var(--line);border-radius:4px;padding:3px 10px}
.empty-s{color:var(--sub);font-size:13px;padding:6px 0}
/* 坚持热力图 + 近十天趋势 */
.chart-sub{font-size:11.5px;color:var(--sub);letter-spacing:.1em;margin-bottom:14px}
.heatwrap{overflow-x:auto;padding-bottom:2px}
.heatwrap svg{display:block}
.hm-d{transition:opacity .15s}.hm-d:hover{opacity:.7}
.hm-n{fill:var(--hm-n)}.hm-1{fill:var(--hm-1)}.hm-2{fill:var(--hm-2)}.hm-3{fill:var(--hm-3)}.hm-4{fill:var(--hm-4)}
.hm-d.today{stroke:var(--akane);stroke-width:1.6}
.hm-label{fill:var(--faint);font-family:Georgia,serif;font-size:9px}
.hm-legend{display:flex;align-items:center;justify-content:flex-end;gap:5px;
  font-size:10.5px;color:var(--sub);letter-spacing:.1em;margin-top:9px}
.hm-legend i{width:11px;height:11px;border-radius:2px;display:inline-block}
/* 中栏底部：答题进度圆点 + 跳题 */
.dotscard{margin-top:38px}
.dotscard .dots{padding-left:28px}
.dotscard .hint{padding-left:28px}
.recent{border-collapse:collapse;font-size:12px;margin-top:12px;width:100%}
.recent th{font-weight:400;color:var(--sub);text-align:left;font-size:10px;letter-spacing:.12em;padding:5px 3px;border-bottom:1px solid var(--line)}
.recent td{padding:5px 3px;border-bottom:1px solid var(--hair);font-variant-numeric:tabular-nums}
.recent td.num{font-family:Georgia,serif}
.recent .up{color:var(--moss)}.recent .down{color:var(--akane)}
.mk{margin:18px 0}
.mk .mkmeta{font-size:11px;color:var(--faint);letter-spacing:.16em;margin-bottom:6px}
.mk img{width:auto;max-width:100%;height:auto;display:block;border-radius:3px}
.empty{padding:90px 10px;text-align:center;color:var(--sub)}
.empty h2{font-family:"Noto Serif CJK SC",serif;color:var(--ink);font-size:21px;letter-spacing:.1em;margin-bottom:14px;font-weight:600}
.empty p{font-size:13px;line-height:2}
footer{margin-top:30px;text-align:center;font-size:10.5px;color:var(--faint);letter-spacing:.5em}

/* 深色模式开关：左下角悬浮的手绘日/月，复用 #sketch 滤镜 + 下沉动效 */
.theme-toggle{position:fixed;left:20px;bottom:18px;z-index:40;width:60px;height:60px;
  padding:0;border:none;cursor:pointer;color:var(--sub);display:grid;place-items:center;
  border-radius:50%;background:radial-gradient(circle,var(--halo) 56%,var(--halo0) 76%);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .2s,opacity .15s}
.theme-toggle svg{width:40px;height:40px;display:block;overflow:visible;
  filter:url(#sketch);transition:transform .2s ease}
.theme-toggle:hover{color:var(--akane)}
.theme-toggle:hover svg{transform:rotate(-14deg) scale(1.08)}
.theme-toggle.press{transform:scale(.72) translateY(3px);opacity:.55;
  color:var(--akane);transition-duration:.08s}
</style>
<script>
/* 预着色：首帧前定明暗，避免白闪。优先本机记忆，否则跟随系统。 */
(function(){try{var t=localStorage.getItem('studio-theme');
  if(!t||t==='auto')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="sketch">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>
<div class="layout">
  <aside class="rail">
    <div class="ddaywrap">
      <div class="kicker">距 考 研</div>
      <div class="dday"><b id="dday">—</b><i>日</i></div>
      <div class="warn">只 进 不 退</div>
    </div>
  </aside>
  <aside class="track">
    <div class="trackcard" id="track"></div>
    <div class="dotscard">
      <div class="stitle"><h2>答题进度</h2><small id="stat">—</small></div>
      <div class="dots" id="dots"></div>
      <div class="hint">点数字跳到对应题</div>
    </div>
    <div class="plan" id="plan"></div>
    <button id="stats-toggle" class="stats-toggle" onclick="toggleStats()">战况诊断</button>
  </aside>
  <main>
    <div class="daynav" id="daynav"></div>
    <div id="daytitle"></div>
    <div id="feed"></div>
  </main>
</div>
<footer>从混沌到清晰</footer>
<button id="theme-toggle" class="theme-toggle" aria-label="深色模式开关" onclick="toggleTheme()"></button>

<script>
let DATA = null;            // 今日(实时)数据
let TODAY_ISO = null;

// —— 深色模式：手绘日/月开关 + 后端记忆 ——
const THEME_ICON = {
  moon: '<path d="M38 13 A 20 20 0 1 0 38 51 A 15 15 0 1 1 38 13 Z" fill="currentColor" stroke="none"/>',
  sun:  '<circle cx="32" cy="32" r="9"/><path d="M32 7 L32 15 M32 49 L32 57 M7 32 L15 32'
      + ' M49 32 L57 32 M15 15 L20 20 M44 44 L49 49 M49 15 L44 20 M15 49 L20 44"/>',
};
const isDark = () => document.documentElement.getAttribute("data-theme") === "dark";
function paintThemeBtn(){
  const b = document.getElementById("theme-toggle"); if (!b) return;
  b.setAttribute("aria-label", isDark() ? "切到亮色" : "切到暗色");
  b.innerHTML = `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2"`
    + ` stroke-linecap="round" stroke-linejoin="round">${isDark() ? THEME_ICON.sun : THEME_ICON.moon}</svg>`;
}
function applyTheme(t, persist){
  if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
  paintThemeBtn();
  if (persist){
    try { localStorage.setItem("studio-theme", t); } catch(e){}
    fetch("/api/theme", {method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({theme:t})}).catch(()=>{});
  }
}
function toggleTheme(){
  const b = document.getElementById("theme-toggle"); b.classList.add("press");
  setTimeout(()=>{ b.classList.remove("press"); applyTheme(isDark() ? "light" : "dark", true); }, 140);
}
paintThemeBtn();

// —— 战况诊断 / 返回刷题：右下角悬浮切换按钮 ——
function paintStatsBtn(){
  const b = document.getElementById("stats-toggle"); if (!b) return;
  const label = inStats ? "返回刷题" : "战况诊断";
  b.innerHTML = `<svg viewBox="0 0 80 34" width="80" height="34"><text x="40" y="23"`
    + ` text-anchor="middle" font-family="Noto Serif CJK SC,serif"`
    + ` font-size="13" fill="currentColor" letter-spacing="4">${label}</text></svg>`;
}
function toggleStats(){
  const b = document.getElementById("stats-toggle"); b.classList.add("press");
  setTimeout(()=>{ b.classList.remove("press"); inStats ? (renderLive(), window.scrollTo(0,0)) : showStats(); }, 140);
}
let curDay = null;          // 正在回顾的历史日期；null=今日实时
let inStats = false;        // 战况诊断视图
paintStatsBtn();
let navPrev = "", navNext = "";   // 当前页左右可去的日期，供键盘用
const $ = s => document.querySelector(s);
const LETTERS = ["A","B","C","D"];
const fmtMD = iso => { const [,m,d] = iso.split("-"); return `${m}/${d}`; };

async function load(){
  DATA = await (await fetch("/api/today")).json();
  if (DATA.theme && DATA.theme !== "auto") applyTheme(DATA.theme, false);   // 服务端记忆为准
  TODAY_ISO = DATA.today;
  $("#dday").textContent = DATA.dday;
  renderLive();
  const first = DATA.items.find(it => it.status === "pending");
  if (first) document.getElementById("blk-"+first.id)
    ?.scrollIntoView({behavior:"instant",block:"center"});
}

// 回到今日实时页
function renderLive(){
  curDay = null; inStats = false; paintStatsBtn();
  renderSidebar();
  renderTrack(DATA.chart);
  renderFeed();
  renderDayNav(DATA.prev, "");
  renderDayTitle("今日", `day ${DATA.day} · ${fmtMD(DATA.today)}`);
}

// 中栏：坚持(热力图 + 近十天)，常驻
function renderTrack(chart){
  const sub = chart && chart.days ? `共 ${chart.days} 天 · 连续 ${chart.streak} 天` : "";
  $("#track").innerHTML =
    `<div class="stitle"><h2>坚持</h2>${sub?`<small>${sub}</small>`:""}</div>`
    + renderChart(chart);
}

// 手绘双横杠箭头(⇐ / ⇒)，过 #sketch 滤镜抖成手绘味
const ARROW = {
  left:  '<path d="M37 10 C 26 21,18 28,13 33 C 18 38,26 45,37 55"/>'
       + '<path d="M16 28 C 38 27,58 27,78 26"/><path d="M16 38 C 38 39,58 39,78 39"/>',
  right: '<path d="M51 10 C 62 21,70 28,75 33 C 70 38,62 45,51 55"/>'
       + '<path d="M72 28 C 50 27,30 27,10 26"/><path d="M72 38 C 50 39,30 39,10 39"/>',
};
const arrowSvg = p => `<svg viewBox="0 0 88 64" fill="none" stroke="currentColor" stroke-width="3.6"`
  + ` stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

// 顶部一左一右翻日箭头；无目标的一侧隐藏但占位
function renderDayNav(prev, next){
  navPrev = prev || ""; navNext = next || "";
  $("#daynav").innerHTML =
      `<button class="dayarrow left ${prev?"":"gone"}" aria-label="前一天" onclick="navDay('${prev||""}',this)">${arrowSvg(ARROW.left)}</button>`
    + `<button class="dayarrow right ${next?"":"gone"}" aria-label="后一天" onclick="navDay('${next||""}',this)">${arrowSvg(ARROW.right)}</button>`;
}
function renderDayTitle(main, sub){
  $("#daytitle").innerHTML = `<div class="stitle"><h2>${main}</h2>${sub?`<small>${sub}</small>`:""}</div>`;
}
// 点击/按键：先加 .press 下沉反馈，再翻日
function navDay(date, btn){
  if (!date) return;
  btn.classList.add("press");
  setTimeout(()=>{ btn.classList.remove("press"); gotoDay(date); }, 160);
}

// 切到某天：今日→实时可答页；其它→只读历史回顾。
function gotoDay(date){
  if (!date) return;
  if (date === TODAY_ISO){ renderLive(); window.scrollTo(0,0); return; }
  curDay = date; inStats = false;
  fetch("/api/day?d="+encodeURIComponent(date)).then(r=>r.json()).then(d=>{
    if (curDay !== date) return;   // 期间又切走了
    renderDayView(d);
  });
}

// 只读渲染历史某天：当天完整题单(答对/答错/未答)，侧栏同步成当天小结。
function renderDayView(d){
  renderDayNav(d.prev, d.next);
  renderDayTitle("回顾", `day ${d.day} · ${fmtMD(d.date)}`);
  const total = d.total != null ? d.total : d.items.length;
  $("#stat").innerHTML = `${fmtMD(d.date)} 答 <b>${d.done}</b>/${total}　对 <b>${d.ok}</b>`;
  const subs = ([...new Set((d.items||[]).map(it=>it.subjectCN).filter(Boolean))]).join(" + ");
  $("#plan").innerHTML = subs ? `当日两门：<b>${subs}</b>` : "";
  fillDots(d.items);
  const feed = $("#feed"); feed.innerHTML = "";
  if (!d.exists || !d.items.length){
    feed.innerHTML = `<div class="empty"><h2>这天没有做题记录</h2>
      <p>左右键或上方箭头可翻到别的日子。</p></div>`;
    window.scrollTo(0,0); return;
  }
  const hd = document.createElement("div");
  hd.className = "grouphd";
  hd.innerHTML = `回顾　<small>${fmtMD(d.date)} · 共 ${total} 题 · 答 ${d.done} · 对 ${d.ok}（${d.done?Math.round(d.ok/d.done*100):0}%）</small>`;
  feed.appendChild(hd);
  for (const it of d.items) feed.appendChild(renderReviewBlock(it));
  window.scrollTo(0,0);
}

// 历史回顾的单题：纯只读，不带可点选项(避免误判进今天)。未答题标“未答”。
function renderReviewBlock(it){
  const b = document.createElement("section");
  b.className = "qblock"; b.id = "blk-"+it.id;
  const tag = it.status === "done"
    ? `<span class="done-tag ${it.ok?'ok':'no'}">${it.ok?'答对':'答错'}</span>`
    : `<span class="done-tag">未答</span>`;
  const pick = (it.pick && !it.ok) ? `　<span class="done-tag">选了 ${it.pick}</span>` : "";
  b.innerHTML = `<div class="qmeta"><b>${it.year}</b>　第 ${it.q} 题　${tag}${pick}</div>
    <img class="qimg" src="${it.img}" alt="第${it.q}题" loading="lazy"${imgW(it)}>`;
  return b;
}

function prettyCh(ch){
  if (!ch || ch.startsWith("zz")) return "未标章节";
  return ch.replace(/^ch\d+_/, "");
}
// 题图宽度：用后端按“字号一致”算好的 dispW；缺失则退回旧的 560px 上限
function imgW(it){ return it.dispW ? ` style="width:${it.dispW}px"` : ` style="max-width:560px"`; }

function renderSidebar(){
  const total = DATA.items.length;
  $("#stat").innerHTML = `今日 <b>${DATA.done}</b>/${total}　对 <b>${DATA.ok}</b>`;
  const subs = (DATA.subjects||[]).join(" + ");
  $("#plan").innerHTML = subs ? `今日两门：<b>${subs}</b>` : "";
  fillDots(DATA.items);
}

function fillDots(items){
  const box = $("#dots"); box.innerHTML = "";
  items.forEach((it, i) => {
    const d = document.createElement("div");
    d.className = "d " + (it.status==="done" ? (it.ok?"ok":"no") : "pending");
    d.textContent = i + 1;
    d.title = `${it.year} 第${it.q}题`;
    d.onclick = () => document.getElementById("blk-"+it.id)
      ?.scrollIntoView({behavior:"smooth",block:"center"});
    box.appendChild(d);
  });
}

function renderFeed(){
  const feed = $("#feed");
  feed.innerHTML = "";
  if (!DATA.items.length){
    feed.innerHTML = `<div class="empty"><h2>今天没有待刷的题</h2>
      <p>错题会按遗忘曲线再回来找你。</p></div>`;
    return;
  }
  let curKey = null;
  for (const it of DATA.items){
    if (it.status !== "done"){            // 只对待做题按 科目·章节 分组成块
      const key = it.subjectCN + "·" + it.chapter;
      if (key !== curKey){
        curKey = key;
        const hd = document.createElement("div");
        hd.className = "grouphd";
        hd.innerHTML = `${it.subjectCN}　<small>${prettyCh(it.chapter)}</small>`;
        feed.appendChild(hd);
      }
    }
    feed.appendChild(renderBlock(it));
  }
  if (DATA.items.every(it=>it.status==="done")) appendDoneNote(feed);
}

function renderBlock(it){
  const b = document.createElement("section");
  b.className = "qblock"; b.id = "blk-"+it.id;
  b.innerHTML = `<div class="qmeta"><b>${it.year}</b>　第 ${it.q} 题</div>
    <img class="qimg" src="${it.img}" alt="第${it.q}题" loading="lazy"${imgW(it)}>`;
  if (it.status === "done"){
    const tag = document.createElement("div");
    tag.className = "fb";
    tag.innerHTML = `<span class="done-tag ${it.ok?'ok':'no'}">${it.ok?'已答对':'已答错'}</span>`;
    b.appendChild(tag);
    return b;
  }
  const opts = document.createElement("div");
  opts.className = "opts";
  opts.innerHTML = LETTERS.map(o=>`<div class="opt" data-o="${o}">${o}</div>`).join("");
  const fb = document.createElement("div"); fb.className = "fb";
  b.appendChild(opts); b.appendChild(fb);
  opts.querySelectorAll(".opt").forEach(el=>{
    el.onclick = () => pickOpt(it, opts, fb, el.dataset.o);
  });
  const submit = mkBtn("提交", () => submitAnswer(it, opts, fb));
  submit.className = "sj submit"; submit.disabled = true;
  fb.appendChild(submit);
  return b;
}

// 选选项：只高亮、可反复改，不判分(避免手滑/瞎填就被锁定)
function pickOpt(it, opts, fb, o){
  if (it._answered) return;
  it._pick = o;
  opts.querySelectorAll(".opt").forEach(el=>el.classList.toggle("pick", el.dataset.o===o));
  const sb = fb.querySelector(".submit"); if (sb) sb.disabled = false;
}

// 点“提交”才判分锁定
async function submitAnswer(it, opts, fb){
  if (it._answered || !it._pick) return;
  it._answered = true;
  const res = await (await fetch("/api/grade",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, pick:it._pick})})).json();
  if (!res.known){            // 无官方答案 → 自判(选项保留高亮)
    it._answered = false;
    fb.innerHTML = `<span class="ask">这题对了吗？</span>`;
    fb.append(mkBtn("✓ 对", ()=>selfjudge(it,opts,fb,true)),
              mkBtn("✗ 错", ()=>selfjudge(it,opts,fb,false)));
    return;
  }
  showVerdict(it, opts, fb, it._pick, res.correct, res.answer);
}

async function selfjudge(it, opts, fb, ok){
  if (it._answered) return; it._answered = true;
  await fetch("/api/grade",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, self:ok})});
  showVerdict(it, opts, fb, null, ok, null);
}

function showVerdict(it, opts, fb, pick, correct, answer){
  opts.classList.add("locked");
  opts.querySelectorAll(".opt").forEach(el=>{
    el.classList.remove("pick");
    const o = el.dataset.o;
    if (answer && o===answer) el.classList.add("ok");
    else if (pick && o===pick && !correct) el.classList.add("no");
    el.onclick = null;
  });
  fb.innerHTML = `<span class="verdict ${correct?'ok':'no'}">${correct?'答对':'答错'}`
    + (answer?`<span class="ans">正确答案 ${answer}</span>`:``) + `</span>`;
  it.status = "done"; it.ok = correct;
  DATA.done += 1; if (correct) DATA.ok += 1;
  renderSidebar();
  if (!correct){      // 错了：疏忽(跳过) / 没懂(进持久待解清单)
    const slip = mkBtn("疏忽·跳过", ()=>fb.querySelector(".markrow")?.remove());
    const stk  = mkBtn("没懂·进待解", ()=>markStuck(it, fb));
    const row = document.createElement("span"); row.className = "markrow";
    row.style.marginLeft = "6px"; row.append(slip, stk);
    fb.appendChild(row);
  }
}
async function markStuck(it, fb){
  await fetch("/api/stuck",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, stuck:true})});
  const row = fb.querySelector(".markrow");
  if (row) row.outerHTML = `<span class="done-tag no">已入待解清单</span>`;
}

function mkBtn(t, fn){ const b=document.createElement("button"); b.className="sj";
  b.textContent=t; b.onclick=fn; return b; }

function appendDoneNote(feed){
  const n = document.createElement("div"); n.className="empty";
  n.innerHTML = `<h2>今天刷完了</h2>
    <p>共 ${DATA.done} 题，对 ${DATA.ok} 题（${DATA.done?Math.round(DATA.ok/DATA.done*100):0}%）<br>
    错题会按遗忘曲线再回来找你。</p>`;
  feed.appendChild(n);
}

// ── 战况诊断 ──
function bar(label, acc, valtext){
  const w = acc == null ? 0 : acc;
  const cls = acc == null ? "" : (acc < 60 ? "weak" : acc >= 85 ? "good" : "");
  const val = acc == null ? "未做" : `${acc}%`;
  return `<div class="bar"><span class="lab">${label}</span>
    <span class="track"><span class="fill ${cls}" style="width:${w}%"></span></span>
    <span class="val">${val}${valtext?" · "+valtext:""}</span></div>`;
}
function sect(title, inner){
  const d = document.createElement("div"); d.className = "sect";
  d.innerHTML = `<h3>${title}</h3>${inner}`;
  return d;
}
// ── 坚持热力图 + 近十天趋势 ──
const HM_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const HM_WINDOW = 5;     // 热力图滚动窗口：最近 5 个月(今天 6 月→覆盖到 2 月)
const fmtIso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const hmLevel = acc => acc>=80?4 : acc>=65?3 : acc>=50?2 : 1;   // 按当天正确率定深浅(做了至少 1 档)

function renderHeat(chart){
  const cells = chart.cells||{}, todayIso = chart.today;
  const today = new Date(todayIso+"T00:00:00");
  let start = new Date(today.getFullYear(), today.getMonth()-(HM_WINDOW-1), 1);
  start.setDate(start.getDate()-start.getDay());        // 回退到周日
  const CELL=12, GAP=3, STEP=CELL+GAP, TOP=14, LEFT=28;
  let rects="", months="", wi=0, lastM=-1;
  for (let d=new Date(start); d<=today; wi++){
    const x = LEFT + wi*STEP;
    if (d.getMonth()!==lastM){ lastM=d.getMonth(); months+=`<text class="hm-label" x="${x}" y="9">${HM_MONTHS[lastM]}</text>`; }
    for (let di=0; di<7; di++){
      if (d<=today){
        const iso=fmtIso(d), c=cells[iso];
        const cls = c===undefined ? "hm-n" : "hm-"+hmLevel(c.acc);
        const here = iso===todayIso ? " today" : "";
        const tip = c===undefined ? `${iso} · 未做` : `${iso} · 正确率 ${c.acc}% · ${c.ok}/${c.n}`;
        rects += `<rect class="hm-d ${cls}${here}" x="${x}" y="${TOP+di*STEP}" width="${CELL}" height="${CELL}" rx="2"><title>${tip}</title></rect>`;
      }
      d.setDate(d.getDate()+1);
    }
  }
  const W=LEFT+wi*STEP, H=TOP+7*STEP;
  const wd=[["Mon",1],["Wed",3],["Fri",5]].map(([t,r])=>`<text class="hm-label" x="0" y="${TOP+r*STEP+9}">${t}</text>`).join("");
  return `<div class="heatwrap"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${months}${wd}${rects}</svg></div>`
    + `<div class="hm-legend" style="max-width:${W}px">少`
    + ` <i style="background:var(--hm-n)"></i>`
    + ` <i style="background:var(--hm-1)"></i><i style="background:var(--hm-2)"></i>`
    + ` <i style="background:var(--hm-3)"></i><i style="background:var(--hm-4)"></i> 多</div>`;
}
function renderRecent(chart){
  const rows = chart.recent||[];
  if (!rows.length) return "";
  let h = `<table class="recent"><tr><th>日期</th><th>题</th><th>正确率</th></tr>`;
  for (const r of rows){
    const trend = r.trend==="↑" ? "up" : r.trend==="↓" ? "down" : "";
    h += `<tr><td>${fmtMD(r.date)}</td><td class="num">${r.n}</td>`
       + `<td class="num ${trend}">${r.acc}%${r.trend ? " "+r.trend : ""}</td></tr>`;
  }
  return h + `</table>`;
}
function renderChart(chart){
  if (!chart || !chart.days)
    return `<div class="empty-s">还没坚持记录。做几天题后，这里出现热力图和近十天趋势。</div>`;
  return renderHeat(chart) + renderRecent(chart);
}

async function showStats(){
  inStats = true; curDay = null; paintStatsBtn();
  $("#daynav").innerHTML = ""; $("#daytitle").innerHTML = "";
  const st = await (await fetch("/api/stats")).json();
  const feed = $("#feed"); feed.innerHTML = "";

  // ⓪ 待解清单(没懂) — 顶部·今晚要解决的
  const stk = st.stuck || [];
  feed.appendChild(sect(`待解清单 · 没懂（${stk.length}）`,
    stk.length ? stk.map(m=>`<div class="mk" id="stuck-${m.id}">
        <div class="mkmeta">${m.subjectCN} · ${prettyCh(m.chapter)} · ${m.year} 第${m.q}题${m.pick?` · 你选了 ${m.pick}`:''}
          <button class="sj solved" data-id="${m.id}">✓ 搞懂了</button></div>
        <img src="${m.img}" loading="lazy"${imgW(m)}></div>`).join("")
      : `<div class="empty-s">还没标"没懂"的题。做错时点「没懂·进待解」，会堆在这里、不自动消，直到你点"搞懂了"。</div>`));

  // ② 弱项诊断
  feed.appendChild(sect("弱项诊断",
    st.weak.length ? st.weak.slice(0,12).map(w=>bar(`${w.subject}·${w.chapter}`, w.acc, `${w.seen}次`)).join("")
      : `<div class="empty-s">还没数据。做几题后，这里按章节正确率把最弱的排在最前。</div>`));

  // ③ 错题本(全部最近做错，含疏忽)
  feed.appendChild(sect(`错题本（${st.mistakes.length}）`,
    st.mistakes.length ? st.mistakes.map(m=>`<div class="mk">
        <div class="mkmeta">${m.subjectCN} · ${prettyCh(m.chapter)} · ${m.year} 第${m.q}题</div>
        <img src="${m.img}" loading="lazy"${imgW(m)}></div>`).join("")
      : `<div class="empty-s">暂无错题 👍</div>`));

  // ④ 冲刺预测分 — 垫底·参考
  const p = st.projection;
  feed.appendChild(sect("冲刺预测分",
    `<div class="proj"><b>≈${p.total}</b><span class="full">/ ${p.full}</span>
       <span class="tgt">目标 ${p.target}</span></div>`
    + p.by_subject.map(s=>bar(s.subject, s.acc, `${s.score}/${s.points}分`)).join("")
    + `<div class="empty-s">粗估：各科正确率×满分求和，仅基于已做选择题，参考用。</div>`));

  feed.querySelectorAll(".solved").forEach(b => b.onclick = () => unstick(b.dataset.id));
  window.scrollTo(0,0);
}
async function unstick(id){
  await fetch("/api/stuck",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, stuck:false})});
  document.getElementById("stuck-"+id)?.remove();
}
// 左右方向键翻看历史(战况诊断视图里不响应)
document.addEventListener("keydown", e => {
  if (inStats || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "ArrowLeft")  { const b=$("#daynav .dayarrow.left:not(.gone)");  if(b){e.preventDefault();b.click();} }
  if (e.key === "ArrowRight") { const b=$("#daynav .dayarrow.right:not(.gone)"); if(b){e.preventDefault();b.click();} }
});

load().then(() => { if (location.hash === "#stats") showStats(); });

// 服务重启后自动 reload：轮询 /api/ping，时间戳变了就刷新页面
(function(){
  let known = null;
  setInterval(async () => {
    try {
      const r = await fetch("/api/ping", {cache:"no-store"});
      const {started} = await r.json();
      if (known === null) { known = started; return; }
      if (started !== known) location.reload();
    } catch(e) {}
  }, 3000);
})();
</script>
