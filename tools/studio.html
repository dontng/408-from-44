<style>
:root{
  --bg:#f4f1e9; --paper:#fcfaf4; --ink:#33302a; --sub:#9b9384; --faint:#c3bbab;
  --line:#e7e0d1; --hair:#ece6d8; --akane:#a13c3c; --ai:#3c5a78; --moss:#5e7a58;
  --dot-bg:#e4dccb; --dot-new:#cdd4da;
  --halo:rgba(244,241,233,.96); --halo0:rgba(244,241,233,0);
  --hm-n:#ebe4d6; --hm-1:#bcd3ab; --hm-2:#94b884; --hm-3:#6f9963; --hm-4:#5e7a58;
}
/* 和纸夜版：暖深炭底 + 柔米白字，点缀色提亮保对比 */
:root[data-theme="dark"]{
  --bg:#1a1613; --paper:#241f1a; --ink:#e7ddcc; --sub:#9a8e7c; --faint:#6b6253;
  --line:#39322b; --hair:#322c25; --akane:#d77f72; --ai:#82a8cb; --moss:#8bb079;
  --dot-bg:#3a332b; --dot-new:#2e3a45;
  --halo:rgba(36,31,26,.95); --halo0:rgba(36,31,26,0);
  --hm-n:#2b2520; --hm-1:#46663a; --hm-2:#5d8a4c; --hm-3:#77a862; --hm-4:#8fc079;
}
html{transition:background-color .35s ease}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans GB","PingFang SC","Noto Sans CJK SC",sans-serif;
  font-size:15px;line-height:1.9;letter-spacing:.025em}

.layout{max-width:1280px;margin:0 auto;padding:42px 36px 90px;
  display:grid;grid-template-columns:184px 340px 1fr;gap:44px}
@media(max-width:1120px){.layout{grid-template-columns:1fr;gap:8px;padding:28px 22px 70px}}

/* ── 左栏 / 中栏 ── */
aside{position:sticky;top:38px;align-self:start}
@media(max-width:1120px){aside{position:static;margin-bottom:8px}}
@media(max-width:1120px){aside.rail{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding-bottom:14px;border-bottom:1px solid var(--hair)}}
/* 中栏：坚持(热力图+近十天) */
aside.track{min-width:0}
@media(max-width:1120px){aside.track{border-bottom:1px solid var(--hair);padding-bottom:18px}}
.kicker{font-size:10px;letter-spacing:.42em;color:var(--sub)}
.rail h1{font-family:"Noto Serif CJK SC",serif;font-size:22px;font-weight:600;letter-spacing:.14em;margin-top:4px}
.dday{margin:22px 0 2px;padding-top:20px;border-top:1px solid var(--line);
  font-family:Georgia,serif;line-height:1}
.dday b{font-size:36px;font-weight:600;color:var(--akane)}
.dday i{font-style:normal;font-size:12px;color:var(--akane);margin-left:4px}
.dday em{display:block;font-style:normal;margin-top:8px;font-size:11px;
  color:var(--sub);letter-spacing:.3em}
.stat{font-size:12.5px;color:var(--sub);letter-spacing:.05em;margin:30px 0 12px}
.stat b{color:var(--ink);font-weight:600}
@media(max-width:780px){.dday{margin:0}.dday b{font-size:30px}.stat{margin:0}}
.dots{display:flex;align-items:center;gap:4px;margin-top:4px}
.dot-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:184px}
.dot-arr{background:none;border:none;cursor:pointer;color:var(--sub);font-size:11px;padding:1px;line-height:1;flex-shrink:0}
.dot-arr:disabled{opacity:.15;cursor:default;pointer-events:none}
.dot-arr:not(:disabled):hover{color:var(--ink)}
.dot-grid .d{aspect-ratio:1;border-radius:5px;background:var(--dot-bg);color:var(--sub);
  font-family:Georgia,serif;font-size:10.5px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .15s,background .2s}
.dot-grid .d:hover{transform:scale(1.18)}
.dot-grid .d.ok{background:var(--moss);color:#fff} .dot-grid .d.no{background:var(--akane);color:#fff}
.dot-grid .d.pending{background:var(--dot-bg);color:var(--sub)}
.dot-grid .d.pending.isnew{background:var(--dot-new);color:var(--sub)}
.plan{font-size:11.5px;color:var(--ai);letter-spacing:.08em;margin:24px 0 6px;line-height:1.95}
.plan .ph{display:inline-block;font-size:10px;letter-spacing:.2em;color:var(--moss);
  border:1px solid var(--moss);border-radius:3px;padding:1px 6px;margin-bottom:5px}
.plan b{color:var(--ink);font-weight:600}
.hint{font-size:10.5px;color:var(--faint);letter-spacing:.2em;margin-top:22px}
@media(max-width:780px){.hint{display:none}}

/* ── 题流 ── */
main{min-width:0}
/* 历史导航：手绘风左右箭头(过 #sketch 滤镜抖成手绘味)；sticky 悬浮于正文顶部 */
.daynav{position:sticky;top:4px;z-index:30;display:flex;justify-content:space-between;align-items:center;
  height:60px;margin:-8px -14px 4px;pointer-events:none}
.dayarrow{pointer-events:auto;width:86px;height:64px;padding:0;border:none;cursor:pointer;
  color:var(--ink);display:grid;place-items:center;border-radius:40px;
  background:radial-gradient(ellipse 60% 70% at center,var(--halo) 55%,var(--halo0) 78%);
  box-shadow:0 4px 18px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .2s,opacity .15s,box-shadow .2s}
.dayarrow svg{width:78px;height:57px;display:block;overflow:visible;filter:url(#sketch)}
.dayarrow:hover{color:var(--akane);box-shadow:0 8px 28px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.07)}
.dayarrow.left:hover{transform:translateX(-5px) scale(1.06)}
.dayarrow.right:hover{transform:translateX(5px) scale(1.06)}
.dayarrow.press{transform:scale(.74) translateY(4px);opacity:.5;color:var(--akane);transition-duration:.08s}
.dayarrow.gone{visibility:hidden;pointer-events:none}
.stitle{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.stitle::before{content:"";align-self:center;width:3px;height:15px;background:var(--akane)}
.stitle h2{font-family:"Noto Serif CJK SC",serif;font-size:16px;font-weight:600;letter-spacing:.2em}
.stitle small{color:var(--sub);font-size:12px;letter-spacing:.1em}
#daytitle{margin-top:48px}
.grouphd{font-family:"Noto Serif CJK SC",serif;font-size:14px;letter-spacing:.14em;
  color:var(--ink);margin:0 0 32px;padding-bottom:10px;border-bottom:2px solid var(--moss);
  display:flex;align-items:baseline;gap:12px}
.grouphd:not(:first-child){margin-top:64px}
.grouphd small{font-size:11px;color:var(--sub);letter-spacing:.08em;font-family:inherit;font-weight:400}
.qblock{padding:0;margin-bottom:28px}
.qblock:last-child{border-bottom:none}
.qmeta{font-family:"Noto Serif CJK SC",serif;font-size:12px;letter-spacing:.22em;
  color:var(--faint);margin-bottom:18px}
.qmeta b{color:var(--sub);font-weight:600}
/* 宽度由后端 dispW 按“字号一致”算好(见 tools/imgnorm.py)，故按原生比例显示而非铺满；
   max-width:100% 仅作超宽表格的兜底，避免溢出主栏 */
.qimg{width:auto;max-width:100%;height:auto;display:block;border-radius:3px}

.opts{margin-top:20px;max-width:560px;display:flex;gap:10px;position:relative;padding-bottom:0}
.submit-pop{position:absolute;transform:scale(.7) translateY(-4px);
  background:var(--ai);color:#fff;border:none;border-radius:6px;
  padding:0 13px;height:33px;font-size:13px;letter-spacing:.12em;
  cursor:pointer;white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .15s,transform .15s,left .12s}
.submit-pop.show{opacity:1;pointer-events:auto;transform:scale(1) translateY(0)}
.opt{width:46px;height:33px;display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-size:14px;color:var(--sub);
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  cursor:pointer;transition:all .16s;user-select:none}
.opt:hover{border-color:var(--ai);color:var(--ai)}
.opt.ok{background:var(--moss);border-color:var(--moss);color:#fff}
.opt.no{background:var(--akane);border-color:var(--akane);color:#fff}
.opt.pick{border-color:var(--ai);color:var(--ai);box-shadow:inset 0 0 0 1px var(--ai)}
.opts.locked .opt{cursor:default}.opts.locked .opt:hover{border-color:var(--line);color:var(--sub)}
.opts.locked .opt.ok:hover{border-color:var(--moss);color:#fff}
.opts.locked .opt.no:hover{border-color:var(--akane);color:#fff}

.fb{margin-top:10px;min-height:18px;display:flex;align-items:center;gap:16px;font-size:13.5px}
.verdict{font-family:"Noto Serif CJK SC",serif;letter-spacing:.12em}
.verdict.ok{color:var(--moss)} .verdict.no{color:var(--akane)}
.verdict .ans{color:var(--sub);font-family:inherit;margin-left:10px;letter-spacing:.05em}
.ask{color:var(--sub)}
.sj{font:inherit;font-size:12.5px;letter-spacing:.1em;cursor:pointer;color:var(--ai);
  background:none;border:1px solid var(--line);border-radius:5px;padding:5px 16px;transition:all .18s}
.sj:hover{border-color:var(--ai);background:var(--ai);color:var(--paper)}
.sj:disabled{opacity:.4;cursor:default;border-color:var(--line);background:none;color:var(--sub)}

.done-tag{font-size:12px;letter-spacing:.15em;color:var(--faint)}
.done-tag.ok{color:var(--moss)} .done-tag.no{color:var(--akane)}
.diag{font-size:12px;letter-spacing:.12em;color:var(--ai);border:1px solid var(--line);
  border-radius:4px;padding:2px 7px}
.diag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.diag-row .sj{padding:4px 10px}
.quota-wrap{margin-top:8px;max-width:184px}
.quota-label{display:flex;justify-content:space-between;gap:8px;font-size:10.5px;color:var(--sub);letter-spacing:.12em}
.quota-done-mark{color:var(--moss)}
.quota-track{height:6px;background:var(--hair);border-radius:3px;overflow:hidden;margin-top:5px}
.quota-fill{height:100%;background:var(--ai);border-radius:3px;transition:width .25s}
.quota-fill.over{background:var(--moss)}

/* ── 疑问口袋：默认折叠，点击展开 ── */
.pocket{margin-top:0;border-top:1px solid var(--hair)}
.pocket-toggle{display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--faint);cursor:pointer;padding:5px 0;
  letter-spacing:.1em;user-select:none;transition:color .18s}
.pocket-toggle:hover{color:var(--sub)}
.pocket-toggle.open{color:var(--ai)}
.pocket-toggle::before{content:"＋";font-family:Georgia,serif;font-size:10px;transition:transform .2s}
.pocket-toggle.open::before{content:"－"}
.pocket-toggle.has-note{color:var(--sub)}
.pocket-body{display:none;padding:0 0 14px}
.pocket-body.show{display:block}
.pocket-body textarea{width:100%;max-width:560px;min-height:78px;
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  padding:10px 12px;font:inherit;font-size:13px;color:var(--ink);
  overflow:hidden;line-height:1.75}
.pocket-body textarea:focus{outline:none;border-color:var(--ai)}
.pocket-body textarea::placeholder{color:var(--faint)}
.pocket-note{font-size:13px;color:var(--sub);line-height:1.75;padding:4px 0}

/* 笔记时间线 */
.pocket-timeline{margin-bottom:12px}
.pocket-row{display:flex;align-items:flex-start;gap:7px;font-size:12px;
  padding:5px 0;line-height:1.6}
.pocket-row+.pocket-row{border-top:1px solid var(--hair)}
.pocket-ts{color:var(--faint);font-size:10px;white-space:nowrap;flex-shrink:0;
  min-width:78px;padding-top:1px}
.pocket-st{font-size:9.5px;padding:1px 5px;border-radius:3px;flex-shrink:0;letter-spacing:.06em}
.pocket-st.open{background:var(--akane);color:#fff}
.pocket-st.progress{background:var(--ai);color:#fff}
.pocket-st.resolved{background:var(--moss);color:#fff}
.pocket-text{color:var(--ink);flex:1;min-width:0}
.pocket-st-toggle{cursor:pointer;font-size:10px;color:var(--faint);flex-shrink:0;
  padding:1px 4px;transition:color .15s;user-select:none}
.pocket-st-toggle:hover{color:var(--akane)}
/* 输入区 */
.pocket-input-row{display:flex;gap:8px;align-items:flex-start}
.pocket-input-row textarea{flex:1;min-height:52px;
  background:var(--paper);border:1px solid var(--line);border-radius:6px;
  padding:8px 10px;font:inherit;font-size:13px;color:var(--ink);
  overflow:hidden;line-height:1.7}
.pocket-input-row textarea:focus{outline:none;border-color:var(--ai)}
.pocket-input-row textarea::placeholder{color:var(--faint)}
.pocket-submit{flex-shrink:0;align-self:flex-end;display:none}
.pocket-submit.dirty{display:inline-block}

/* ── 战况诊断面板 ── */
.stats-toggle{display:inline-grid;place-items:center;margin-top:28px;margin-left:42px;
  padding:0 16px 0 calc(16px + .14em);height:40px;border:none;cursor:pointer;
  color:var(--ink);font-size:12px;font-weight:500;letter-spacing:.14em;
  border-radius:14px;background:var(--paper);
  box-shadow:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),color .2s,box-shadow .2s}
.stats-toggle:hover{color:var(--akane);transform:scale(1.04);box-shadow:0 6px 20px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06)}
.stats-toggle svg{display:block;overflow:visible;filter:url(#sketch)}
.stats-toggle.press{transform:scale(.74) translateY(4px);opacity:.5;color:var(--akane);transition-duration:.08s}
.sect{margin-bottom:42px}
.sect h3{font-family:"Noto Serif CJK SC",serif;font-size:14px;letter-spacing:.18em;color:var(--ink);
  margin-bottom:18px;padding-bottom:7px;border-bottom:2px solid var(--moss);display:inline-block}
.proj{display:flex;align-items:baseline;gap:14px;margin-bottom:20px}
.proj b{font-family:"Noto Serif CJK SC",serif;font-size:46px;color:var(--akane);font-weight:700;line-height:1}
.proj .full{font-size:13px;color:var(--sub)} .proj .tgt{font-size:12px;color:var(--moss);letter-spacing:.1em}
.bar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12.5px;max-width:560px}
.bar .lab{width:150px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;height:8px;background:var(--hair);border-radius:4px;overflow:hidden}
.bar .fill{height:100%;background:var(--ai);border-radius:4px;transition:width .4s}
.bar .fill.weak{background:var(--akane)} .bar .fill.good{background:var(--moss)}
.bar .val{width:84px;text-align:right;color:var(--sub);font-family:Georgia,serif;font-size:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{font-size:11.5px;color:var(--akane);border:1px solid var(--line);border-radius:4px;padding:3px 10px}
.empty-s{color:var(--sub);font-size:13px;padding:6px 0}
/* 坚持热力图 + 近十天趋势 */
.chart-sub{font-size:11.5px;color:var(--sub);letter-spacing:.1em;margin-bottom:14px}
.heatwrap{overflow-x:hidden;padding-bottom:2px}
.heatwrap svg{display:block}
.hm-d{transition:opacity .15s}.hm-d:hover{opacity:.7}
.hm-n{fill:var(--hm-n)}.hm-1{fill:var(--hm-1)}.hm-2{fill:var(--hm-2)}.hm-3{fill:var(--hm-3)}.hm-4{fill:var(--hm-4)}
.hm-d.today{stroke:var(--akane);stroke-width:1.6}
.hm-label{fill:var(--faint);font-family:Georgia,serif;font-size:9px}
.hm-legend{display:flex;align-items:center;justify-content:flex-end;gap:5px;
  font-size:10.5px;color:var(--sub);letter-spacing:.1em;margin-top:9px}
.hm-legend i{width:11px;height:11px;border-radius:2px;display:inline-block}
/* 中栏底部：答题进度圆点 + 跳题 */
.dotscard{margin-top:38px}
.dotscard .dots{padding-left:14px}
.dotscard .plan{padding-left:14px}
.dotscard .hint{padding-left:28px}
.recent{border-collapse:collapse;font-size:12px;margin-top:12px;width:100%}
.recent th{font-weight:400;color:var(--sub);text-align:left;font-size:10px;letter-spacing:.12em;padding:5px 3px;border-bottom:1px solid var(--line)}
.recent td{padding:5px 3px;border-bottom:1px solid var(--hair);font-variant-numeric:tabular-nums}
.recent td.num{font-family:Georgia,serif}
.recent .up{color:var(--moss)}.recent .down{color:var(--akane)}
.mk{margin:18px 0}
.mk .mkmeta{font-size:11px;color:var(--faint);letter-spacing:.16em;margin-bottom:6px}
.mk img{width:auto;max-width:100%;height:auto;display:block;border-radius:3px}
.empty{padding:90px 10px;text-align:center;color:var(--sub)}
.empty h2{font-family:"Noto Serif CJK SC",serif;color:var(--ink);font-size:21px;letter-spacing:.1em;margin-bottom:14px;font-weight:600}
.empty p{font-size:13px;line-height:2}
footer{margin-top:30px;text-align:center;font-size:10.5px;color:var(--faint);letter-spacing:.5em}

/* 深色模式开关：左下角悬浮的手绘日/月，复用 #sketch 滤镜 + 下沉动效 */
.theme-toggle{position:fixed;left:20px;bottom:18px;z-index:40;width:60px;height:60px;
  padding:0;border:none;cursor:pointer;color:var(--sub);display:grid;place-items:center;
  border-radius:50%;background:radial-gradient(circle,var(--halo) 56%,var(--halo0) 76%);

</style>
<script>
/* 预着色：首帧前定明暗，避免白闪。优先本机记忆，否则跟随系统。 */
(function(){try{var t=localStorage.getItem('studio-theme');
  if(!t||t==='auto')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="sketch">
    <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>
<div class="layout">
  <aside class="rail">
    <div class="kicker">408 · CHAOS2CLARITY</div>
    <h1>真题刷题</h1>
    <div class="dday"><b id="dday">—</b><i>天</i><em>距 考 试</em></div>
  </aside>
  <aside class="track">
    <div class="trackcard" id="track"></div>
    <div class="dotscard">
      <div class="stitle"><h2>答题进度</h2><small id="stat">—</small></div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="plan" id="plan"></div>
    <button id="stats-toggle" class="stats-toggle" onclick="toggleStats()">战况诊断</button>
  </aside>
  <main>
    <div class="daynav" id="daynav"></div>
    <div id="daytitle"></div>
    <div id="feed"></div>
  </main>
</div>
<footer>从混沌到清晰</footer>
<button id="theme-toggle" class="theme-toggle" aria-label="深色模式开关" onclick="toggleTheme()"></button>

<script>
let DATA = null;            // 今日(实时)数据
let TODAY_ISO = null;

// —— 深色模式：手绘日/月开关 + 后端记忆 ——
const THEME_ICON = {
  moon: '<path d="M38 13 A 20 20 0 1 0 38 51 A 15 15 0 1 1 38 13 Z" fill="currentColor" stroke="none"/>',
  sun:  '<circle cx="32" cy="32" r="9"/><path d="M32 7 L32 15 M32 49 L32 57 M7 32 L15 32'
      + ' M49 32 L57 32 M15 15 L20 20 M44 44 L49 49 M49 15 L44 20 M15 49 L20 44"/>',
};
const isDark = () => document.documentElement.getAttribute("data-theme") === "dark";
function paintThemeBtn(){
  const b = document.getElementById("theme-toggle"); if (!b) return;
  b.setAttribute("aria-label", isDark() ? "切到亮色" : "切到暗色");
  b.innerHTML = `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2"`
    + ` stroke-linecap="round" stroke-linejoin="round">${isDark() ? THEME_ICON.sun : THEME_ICON.moon}</svg>`;
}
function applyTheme(t, persist){
  if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
  paintThemeBtn();
  if (persist){
    try { localStorage.setItem("studio-theme", t); } catch(e){}
    fetch("/api/theme", {method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({theme:t})}).catch(()=>{});
  }
}
function toggleTheme(){
  const b = document.getElementById("theme-toggle"); b.classList.add("press");
  setTimeout(()=>{ b.classList.remove("press"); applyTheme(isDark() ? "light" : "dark", true); }, 140);
}
paintThemeBtn();

// —— 战况诊断 / 返回刷题：右下角悬浮切换按钮 ——
function paintStatsBtn(){
  const b = document.getElementById("stats-toggle"); if (!b) return;
  const label = inStats ? "返回刷题" : "战况诊断";
  b.innerHTML = `<svg viewBox="0 0 80 34" width="80" height="34"><text x="40" y="23"`
    + ` text-anchor="middle" font-family="Noto Serif CJK SC,serif"`
    + ` font-size="13" fill="currentColor" letter-spacing="4">${label}</text></svg>`;
}
function toggleStats(){
  const b = document.getElementById("stats-toggle"); b.classList.add("press");
  setTimeout(()=>{
    b.classList.remove("press");
    if(inStats){
      // 返回到之前所在的那天（历史日 or 今日）
      const backDay = curDay;
      curFeedPage=0; curDotPage=0;
      if(backDay){ gotoDay(backDay); }
      else { renderLive(); window.scrollTo(0,0); }
    } else {
      showStats();
    }
  }, 140);
}
let curDay = null;          // 正在回顾的历史日期；null=今日实时
let inStats = false;        // 战况诊断视图
const PAGE_SIZE = 10;
const DOT_PAGE = 21;
let curFeedPage = 0;        // 当前题页(0起)
let curDotPage = 0;         // 点区当前页(0起)
paintStatsBtn();
let navPrev = "", navNext = "";   // 当前页左右可去的日期，供键盘用
const $ = s => document.querySelector(s);
const LETTERS = ["A","B","C","D"];
const fmtMD = iso => { const [,m,d] = iso.split("-"); return `${m}/${d}`; };
const DIAG_CN = {outside:"圈外", misselect:"误选", uncertain:"心虚", solid:"稳了"};
const diagTag = d => d ? `　<span class="diag">${DIAG_CN[d]||d}</span>` : "";

async function load(){
  DATA = await (await fetch("/api/today")).json();
  if (DATA.theme && DATA.theme !== "auto") applyTheme(DATA.theme, false);   // 服务端记忆为准
  TODAY_ISO = DATA.today;
  $("#dday").textContent = DATA.dday;
  const firstIdx = DATA.items.findIndex(it => it.status === "pending");
  curFeedPage = firstIdx >= 0 ? Math.floor(firstIdx / PAGE_SIZE) : 0;
  renderLive();
  const first = DATA.items.find(it => it.status === "pending");
  if (first) document.getElementById("blk-"+first.id)
    ?.scrollIntoView({behavior:"instant",block:"center"});
}

// 回到今日实时页
function renderLive(){
  curDay = null; inStats = false; paintStatsBtn();
  renderSidebar();
  renderTrack(DATA.chart);
  renderFeed();
  renderDayNav(DATA.prev, "");
  renderDayTitle("今日", `day ${DATA.day} · ${fmtMD(DATA.today)}`);
}

// 中栏：坚持(热力图 + 近十天)，常驻
function renderTrack(chart){
  const sub = chart && chart.days ? `共 ${chart.days} 天 · 连续 ${chart.streak} 天` : "";
  $("#track").innerHTML =
    `<div class="stitle"><h2>坚持</h2>${sub?`<small>${sub}</small>`:""}</div>`
    + renderChart(chart);
}

// 手绘双横杠箭头(⇐ / ⇒)，过 #sketch 滤镜抖成手绘味
const ARROW = {
  left:  '<path d="M37 10 C 26 21,18 28,13 33 C 18 38,26 45,37 55"/>'
       + '<path d="M16 28 C 38 27,58 27,78 26"/><path d="M16 38 C 38 39,58 39,78 39"/>',
  right: '<path d="M51 10 C 62 21,70 28,75 33 C 70 38,62 45,51 55"/>'
       + '<path d="M72 28 C 50 27,30 27,10 26"/><path d="M72 38 C 50 39,30 39,10 39"/>',
};
const arrowSvg = p => `<svg viewBox="0 0 88 64" fill="none" stroke="currentColor" stroke-width="3.6"`
  + ` stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

// 顶部一左一右切换日期箭头；无目标的一侧隐藏但占位
function renderDayNav(prev, next){
  navPrev = prev || ""; navNext = next || "";
  $("#daynav").innerHTML =
      `<button class="dayarrow left ${prev?"":"gone"}" aria-label="前一天" onclick="navDay('${prev||""}',this)">${arrowSvg(ARROW.left)}</button>`
    + `<button class="dayarrow right ${next?"":"gone"}" aria-label="后一天" onclick="navDay('${next||""}',this)">${arrowSvg(ARROW.right)}</button>`;
}
function renderDayTitle(main, sub){
  $("#daytitle").innerHTML = `<div class="stitle"><h2>${main}</h2>${sub?`<small>${sub}</small>`:""}</div>`;
}
// 点击：先加 .press 下沉反馈，再切换日期
function navDay(date, btn){
  if (!date) return;
  btn.classList.add("press");
  setTimeout(()=>{ btn.classList.remove("press"); gotoDay(date); }, 160);
}

// 切到某天：今日→实时可答页；其它→只读历史回顾。
function gotoDay(date){
  if (!date) return;
  if (date === TODAY_ISO){ curFeedPage=0; curDotPage=0; renderLive(); window.scrollTo(0,0); return; }
  curDay = date; inStats = false;
  fetch("/api/day?d="+encodeURIComponent(date)).then(r=>r.json()).then(d=>{
    if (curDay !== date) return;   // 期间又切走了
    renderDayView(d);
  });
}

// 只读渲染历史某天：当天完整题单(答对/答错/未答)，侧栏同步成当天小结。
function renderDayView(d){
  renderDayNav(d.prev, d.next);
  renderDayTitle("回顾", `day ${d.day} · ${fmtMD(d.date)}`);
  const total = d.total != null ? d.total : d.items.length;
  $("#stat").innerHTML = `${fmtMD(d.date)} 答 <b>${d.done}</b>/${total}　对 <b>${d.ok}</b>`;
  const subs = ([...new Set((d.items||[]).map(it=>it.subjectCN).filter(Boolean))]).join(" + ");
  $("#plan").innerHTML = subs ? `当日两门：<b>${subs}</b>` : "";
  fillDots(d.items);
  const feed = $("#feed"); feed.innerHTML = "";
  if (!d.exists || !d.items.length){
    feed.innerHTML = `<div class="empty"><h2>这天没有做题记录</h2>
      <p>左右键或上方箭头可翻到别的日子。</p></div>`;
    window.scrollTo(0,0); return;
  }
  const hd = document.createElement("div");
  hd.className = "grouphd";
  hd.innerHTML = `回顾　<small>${fmtMD(d.date)} · 共 ${total} 题 · 答 ${d.done} · 对 ${d.ok}（${d.done?Math.round(d.ok/d.done*100):0}%）</small>`;
  feed.appendChild(hd);
  for (const it of d.items) feed.appendChild(renderReviewBlock(it));
  window.scrollTo(0,0);
}

// 历史回顾的单题：纯只读，不带可点选项(避免误判进今天)。未答题标“未答”。
function renderReviewBlock(it){
  const b = document.createElement("section");
  b.className = "qblock"; b.id = "blk-"+it.id;
  const tag = it.status === "done"
    ? `<span class="done-tag ${it.ok?'ok':'no'}">${it.ok?'答对':'答错'}</span>`
    : `<span class="done-tag">未答</span>`;
  const pick = it.pick ? `　<span class="done-tag">选了 ${it.pick}</span>` : "";
  b.innerHTML = `<div class="qmeta"><b>${it.year}</b>　第 ${it.q} 题　${tag}${pick}</div>
    <img class="qimg" src="${it.img}" alt="第${it.q}题" loading="lazy"${imgW(it)}>`;
  if (it.diagnosis) b.querySelector(".qmeta").insertAdjacentHTML("beforeend", diagTag(it.diagnosis));
  b.appendChild(makePocket(it.id, it.notes, true, false));
  return b;
}

function prettyCh(ch){
  if (!ch || ch.startsWith("zz")) return "未标章节";
  return ch.replace(/^ch\d+_/, "");
}
// 题图宽度：用后端按“字号一致”算好的 dispW；缺失则退回旧的 560px 上限
function imgW(it){ return it.dispW ? ` style="width:${it.dispW}px"` : ` style="max-width:560px"`; }

function renderSidebar(){
  const total = DATA.items.length;
  const done = DATA.done;
  const quota = DATA.quota || total || 10;
  const pct = Math.min(100, Math.round(done / quota * 100));
  const over = done >= quota;
  $("#stat").innerHTML = `今日 <b>${done}</b>/${total}　对 <b>${DATA.ok}</b>`;
  const subs = (DATA.subjects||[]).join(" + ");
  $("#plan").innerHTML = (subs ? `今日两门：<b>${subs}</b>` : "")
    + `<div class="quota-wrap">
         <div class="quota-label"><span>日配额 ${done}/${quota} 题</span>${over?'<span class="quota-done-mark">✓ 达标</span>':''}</div>
         <div class="quota-track"><div class="quota-fill${over?' over':''}" style="width:${pct}%"></div></div>
       </div>`;
  fillDots(DATA.items);
}

function fillDots(items){
  const box = $("#dots"); box.innerHTML = "";
  const totalDotPages = Math.ceil(items.length / DOT_PAGE);
  const base = curDotPage * DOT_PAGE;
  const slice = items.slice(base, base + DOT_PAGE);

  const hasPager = totalDotPages > 1;
  const prev = document.createElement("button"); prev.className = "dot-arr";
  prev.textContent = "◀"; prev.disabled = curDotPage === 0;
  prev.onclick = () => { curDotPage--; fillDots(items); };
  if (hasPager) box.appendChild(prev);

  const grid = document.createElement("div"); grid.className = "dot-grid";
  slice.forEach((it, i) => {
    const gi = base + i;
    const d = document.createElement("div");
    const isNew = it.isNew ? " isnew" : "";
    d.className = "d " + (it.status==="done" ? (it.ok?"ok":"no") : "pending") + isNew;
    d.textContent = gi + 1;
    d.title = `${it.year} 第${it.q}题`;
    d.onclick = () => {
      const page = Math.floor(gi / PAGE_SIZE);
      if (page !== curFeedPage){ curFeedPage = page; renderFeed(); }
      // 等当前页所有题图加载完再滚动，避免图片未加载时计算位置偏上
      const scrollToBlk = () => {
        const el = document.getElementById("blk-"+it.id);
        if (!el) return;
        const imgs = [...document.querySelectorAll(".qblock img")];
        const pending = imgs.filter(img => !img.complete);
        if (pending.length) {
          let waited = 0;
          pending.forEach(img => {
            const done = () => { waited++; if (waited >= pending.length) el.scrollIntoView({behavior:"smooth",block:"center"}); };
            img.addEventListener("load", done, {once: true});
            img.addEventListener("error", done, {once: true});
          });
          // 兜底：300ms 后无论如何滚一次
          setTimeout(() => el.scrollIntoView({behavior:"smooth",block:"center"}), 300);
        } else {
          el.scrollIntoView({behavior:"smooth",block:"center"});
        }
      };
      requestAnimationFrame(() => requestAnimationFrame(scrollToBlk));
    };
    grid.appendChild(d);
  });

  const next = document.createElement("button"); next.className = "dot-arr";
  next.textContent = "▶"; next.disabled = curDotPage >= totalDotPages - 1;
  next.onclick = () => { curDotPage++; fillDots(items); };

  box.appendChild(grid);
  if (hasPager) box.appendChild(next);
}

function renderFeed(){
  const feed = $("#feed");
  feed.innerHTML = "";
  if (!DATA.items.length){
    feed.innerHTML = `<div class="empty"><h2>今天没有待刷的题</h2>
      <p>错题会按遗忘曲线再回来找你。</p></div>`;
    return;
  }
  // 同步点区：让当前题页的第一题落在点区可见范围内
  const needDotPage = Math.floor(curFeedPage * PAGE_SIZE / DOT_PAGE);
  if (needDotPage !== curDotPage){ curDotPage = needDotPage; fillDots(DATA.items); }

  const totalPages = Math.ceil(DATA.items.length / PAGE_SIZE);
  const pageItems = DATA.items.slice(curFeedPage * PAGE_SIZE, (curFeedPage + 1) * PAGE_SIZE);
  for (const it of pageItems){
    feed.appendChild(renderBlock(it));
  }
  if (DATA.items.every(it=>it.status==="done")) appendDoneNote(feed);
  if (totalPages > 1){
    const nav = document.createElement("div"); nav.className = "pager";
    const prev = document.createElement("button"); prev.className = "sj";
    prev.textContent = "← 上一页"; prev.disabled = curFeedPage === 0;
    prev.onclick = () => { curFeedPage--; renderFeed(); window.scrollTo(0,0); };
    const info = document.createElement("span"); info.className = "pager-info";
    info.textContent = `第 ${curFeedPage+1} / ${totalPages} 页`;
    const next = document.createElement("button"); next.className = "sj";
    next.textContent = "下一页 →"; next.disabled = curFeedPage >= totalPages - 1;
    next.onclick = () => { curFeedPage++; renderFeed(); window.scrollTo(0,0); };
    nav.append(prev, info, next);
    feed.appendChild(nav);
  }
}

function renderBlock(it){
  const b = document.createElement("section");
  b.className = "qblock"; b.id = "blk-"+it.id;
  b.innerHTML = `<div class="qmeta"><b>${it.year}</b>　第 ${it.q} 题</div>
    <img class="qimg" src="${it.img}" alt="第${it.q}题" loading="lazy"${imgW(it)}>`;
  if (it.status === "done"){
    const tag = document.createElement("div");
    tag.className = "fb";
    tag.innerHTML = `<span class="done-tag ${it.ok?'ok':'no'}">${it.ok?'已答对':'已答错'}</span>${diagTag(it.diagnosis)}`;
    if (!it.diagnosis) {
      tag.appendChild(makeDiagRow(it, it.ok));
    }
    b.appendChild(tag);
    b.appendChild(makePocket(it.id, it.notes, false, true));
    return b;
  }
  const opts = document.createElement("div");
  opts.className = "opts";
  opts.innerHTML = LETTERS.map(o=>`<div class="opt" data-o="${o}">${o}</div>`).join("");
  const fb = document.createElement("div"); fb.className = "fb";
  // 浮层提交按钮，跟着被选选项出现
  const pop = document.createElement("button"); pop.className = "submit-pop";
  pop.textContent = "提交"; pop.onclick = () => submitAnswer(it, opts, fb, pop);
  opts.appendChild(pop);
  b.appendChild(opts); b.appendChild(fb);
  b.appendChild(makePocket(it.id, it.notes, false, false));
  opts.querySelectorAll(".opt").forEach(el=>{
    el.onclick = () => pickOpt(it, opts, fb, el, pop);
  });
  return b;
}

// 选选项：只高亮、可反复改，不判分(避免手滑/瞎填就被锁定)
function pickOpt(it, opts, fb, el, pop){
  if (it._answered) return;
  // 再次点击已选项 → 取消选择
  if (it._pick === el.dataset.o){
    it._pick = null;
    el.classList.remove("pick");
    pop.classList.remove("show");
    return;
  }
  it._pick = el.dataset.o;
  opts.querySelectorAll(".opt").forEach(e=>e.classList.toggle("pick", e===el));
  pop.style.left = el.offsetLeft + "px";
  pop.style.top = (el.offsetTop + el.offsetHeight + 8) + "px";
  pop.classList.add("show");
}

// 点“提交”才判分锁定
async function submitAnswer(it, opts, fb, pop){
  if (it._answered || !it._pick) return;
  if (pop) pop.classList.remove("show");
  it._answered = true;
  const res = await (await fetch("/api/grade",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, pick:it._pick})})).json();
  if (!res.known){            // 无官方答案 → 自判(选项保留高亮)
    it._answered = false;
    fb.innerHTML = `<span class="ask">这题对了吗？</span>`;
    fb.append(mkBtn("✓ 对", ()=>selfjudge(it,opts,fb,true)),
              mkBtn("✗ 错", ()=>selfjudge(it,opts,fb,false)));
    return;
  }
  showVerdict(it, opts, fb, it._pick, res.correct, res.answer);
}

async function selfjudge(it, opts, fb, ok){
  if (it._answered) return; it._answered = true;
  await fetch("/api/grade",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, self:ok})});
  showVerdict(it, opts, fb, null, ok, null);
}

function showVerdict(it, opts, fb, pick, correct, answer){
  opts.classList.add("locked");
  opts.querySelectorAll(".opt").forEach(el=>{
    el.classList.remove("pick");
    const o = el.dataset.o;
    if (answer && o===answer) el.classList.add("ok");
    else if (pick && o===pick && !correct) el.classList.add("no");
    el.onclick = null;
  });
  fb.innerHTML = `<span class="verdict ${correct?'ok':'no'}">${correct?'答对':'答错'}`
    + (answer?`<span class="ans">正确答案 ${answer}</span>`:``) + `</span>`;
  it.status = "done"; it.ok = correct;
  DATA.done += 1; if (correct) DATA.ok += 1;
  renderSidebar();
  fb.appendChild(makeDiagRow(it, correct));
}
function makeDiagRow(it, correct){
  const row = document.createElement("div");
  row.className = "diag-row";
  const choices = correct
    ? [["uncertain","心虚"],["solid","稳了"]]
    : [["outside","圈外"],["misselect","误选"]];
  choices.forEach(([code, label]) => {
    const btn = mkBtn(label, async () => {
      await setDiagnosis(it, code);
      row.outerHTML = `<span class="diag">${label}</span>`;
    });
    row.appendChild(btn);
  });
  return row;
}
async function setDiagnosis(it, diagnosis){
  it.diagnosis = diagnosis;
  if (diagnosis === "solid") it.stuck = false;
  else it.stuck = true;
  await fetch("/api/diagnosis",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:it.id, diagnosis})});
}
async function markStuckById(id, reason="stuck"){
  await fetch("/api/stuck",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, stuck:true, reason})});
}
async function markStuck(it, fb, reason="stuck"){

  const label = reason === "slip" ? "疏忽·已入待解" : "仍需攻克·已标";

function mkBtn(t, fn){ const b=document.createElement("button"); b.className="sj";
  b.textContent=t; b.onclick=fn; return b; }

// ── 疑问口袋：后端 notes.json 持久化 ──
const NOTE_STATUS_CN = {"open":"未解决","progress":"有进展","resolved":"已解决"};

function makePocket(id, notes, readonly, done){
  const pocket = document.createElement("div");
  pocket.className = "pocket";
  const toggle = document.createElement("span");
  toggle.className = "pocket-toggle";
  const body = document.createElement("div");
  body.className = "pocket-body";

  notes = notes || [];
  const hasUnresolved = notes.some(n => n.status !== "resolved");
  const defaultOpen = true;

  if (readonly && !notes.length) { pocket.style.display = "none"; return pocket; }

  toggle.textContent = "疑问";
  if (hasUnresolved) toggle.classList.add("has-note");

  // ── 笔记时间线 ──
  if (notes.length) {
    const tl = document.createElement("div"); tl.className = "pocket-timeline";
    notes.forEach((n, i) => {
      const row = document.createElement("div"); row.className = "pocket-row";
      const st = n.status || "open";
      const role = n.role || "";
      const tsShort = (n.ts||"").replace("T"," ").slice(0,16);
      row.innerHTML = `<span class="pocket-ts">${n.day?`D${n.day} `:""}${tsShort}</span>`
        + `<span class="pocket-st ${st}">${role==="ai"?"AI":NOTE_STATUS_CN[st]||st}</span>`
        + `<span class="pocket-text">${escHtml(n.text||"")}</span>`;
      // 状态切换（只对用户笔记，不对 AI 回答）
      if (!readonly && role !== "ai") {
        const stTgl = document.createElement("span");
        stTgl.className = "pocket-st-toggle"; stTgl.title = "切换状态"; stTgl.textContent = "◷";
        stTgl.onclick = async () => {
          const next = st === "open" ? "progress" : st === "progress" ? "resolved" : "open";
          const r = await fetch("/api/notes", {method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({qid:id, idx:i, status:next})});
          const j = await r.json();
          if (j.ok) { const np = makePocket(id, j.notes, false, done); pocket.replaceWith(np); np.querySelector(".pocket-toggle").classList.add("open"); np.querySelector(".pocket-body").classList.add("show"); }
        };
        row.appendChild(stTgl);
      }
      tl.appendChild(row);
    });
    body.appendChild(tl);
  }

  // ── 输入区（草稿自动保存到 localStorage，点「记下」后清除）──
  let ta = null;
  if (!readonly) {
    const DRAFT_KEY = "draft-"+id;
    const ir = document.createElement("div"); ir.className = "pocket-input-row";
    ta = document.createElement("textarea");
    ta.placeholder = "记录你对这道题的疑问或困惑…"; ta.rows = 2;
    // 恢复草稿
    try { const d = localStorage.getItem(DRAFT_KEY); if (d) ta.value = d; } catch(e) {}
    // 离开编辑区立刻存草稿到 localStorage，同时静默提交到后端
    const saveDraft = () => {
      try { if (ta.value.trim()) localStorage.setItem(DRAFT_KEY, ta.value);
            else localStorage.removeItem(DRAFT_KEY); } catch(e) {}
    };
    const submitNote = async (text) => {
      if (!text || !text.trim()) return null;
      const r = await fetch("/api/notes", {method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({qid:id, text:text.trim(), status:"open"})});
      return await r.json();
    };
    ta.addEventListener("blur", () => {
      saveDraft();
      if (ta.value.trim()) submitNote(ta.value);  // 静默提交，不重建口袋
    });
    // 自动撑高，不出现滚动条
    const autoResize = () => {
      ta.style.height = "auto";
      ta.style.height = ta.scrollHeight + "px";
    };
    const btn = document.createElement("button"); btn.className = "sj pocket-submit";
    btn.textContent = "记下";
    let draftTimer = null;
    ta.addEventListener("input", () => {
      autoResize();
      clearTimeout(draftTimer);
      draftTimer = setTimeout(saveDraft, 2000);
      // 有内容就显示记下按钮，空了就藏
      btn.classList.toggle("dirty", ta.value.trim().length > 0);
    });
    // 恢复草稿后也做一次撑开 + 显示按钮 — 此时口袋可能折叠着，scrollHeight 为 0，
    // 所以把 textarea 记下，等展开时再补一次 resize（见 toggle 处）
    if (ta.value) {
      btn.classList.add("dirty");
      requestAnimationFrame(() => { if (body.classList.contains("show")) autoResize(); });
    }
    btn.onclick = async () => {
      const text = ta.value.trim(); if (!text) return;
      btn.disabled = true; btn.textContent = "…";
      const j = await submitNote(text);
      if (j && j.ok) {
        try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
        const np = makePocket(id, j.notes, false, done); pocket.replaceWith(np);
        // 记下后强制展开，让用户直接看到刚保存的内容
        np.querySelector(".pocket-toggle").classList.add("open");
        np.querySelector(".pocket-body").classList.add("show");
      } else {
        btn.disabled = false; btn.textContent = "记下";
      }
    };
    ir.appendChild(ta); ir.appendChild(btn);
    body.appendChild(ir);
  }

  pocket.appendChild(toggle);
  pocket.appendChild(body);

  // 做过且有笔记 → 默认展开
  if (defaultOpen) {
    body.classList.add("show");
    toggle.classList.add("open");
  }

  toggle.addEventListener("click", () => {
    const open = body.classList.toggle("show");
    toggle.classList.toggle("open", open);
    // 展开时重新撑高（折叠时 scrollHeight 为 0，必须展开后再算）
    if (open && ta) {
      requestAnimationFrame(() => {
        ta.style.height = "auto";
        ta.style.height = ta.scrollHeight + "px";
      });
    }
  });

  return pocket;
}
function escHtml(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

function appendDoneNote(feed){

  n.innerHTML = `<h2>今天刷完了</h2>

// ── 战况诊断 ──
function bar(label, acc, valtext){
  const w = acc == null ? 0 : acc;
  const cls = acc == null ? "" : (acc < 60 ? "weak" : acc >= 85 ? "good" : "");
  const val = acc == null ? "未做" : `${acc}%`;
  return `<div class="bar"><span class="lab">${label}</span>
    <span class="track"><span class="fill ${cls}" style="width:${w}%"></span></span>
    <span class="val">${val}${valtext?" · "+valtext:""}</span></div>`;
}
function sect(title, inner){
  const d = document.createElement("div"); d.className = "sect";
  d.innerHTML = `<h3>${title}</h3>${inner}`;
  return d;
}
function barDrill(label, acc, valtext, subjectEN, chapterRaw){
  const w = acc == null ? 0 : acc;
  const cls = acc == null ? "" : (acc < 60 ? "weak" : acc >= 85 ? "good" : "");
  const val = acc == null ? "未做" : `${acc}%`;
  return `<div class="bar"><span class="lab">${label}</span>
    <span class="track"><span class="fill ${cls}" style="width:${w}%"></span></span>
    <span class="val">${val}${valtext?" · "+valtext:""}</span>
    <button class="sj drill-btn" data-subj="${subjectEN}" data-ch="${chapterRaw}">练 →</button></div>`;
}
function drillChapter(subjectEN, chapterRaw){
  inStats = false; paintStatsBtn();
  renderLive(); window.scrollTo(0,0);
  requestAnimationFrame(() => {
    const t = DATA.items.find(it =>
      it.subject === subjectEN && it.chapter === chapterRaw && it.status === "pending");
    if (t) document.getElementById("blk-"+t.id)?.scrollIntoView({behavior:"smooth",block:"center"});
  });
}
// ── 坚持热力图 + 近十天趋势 ──
const HM_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const HM_WINDOW = 5;     // 热力图回溯月数
const fmtIso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
// 按完成题数/配额比例分档；无 roster 时以 20 题为满额兜底
// <30%→灰米(同无数据), 30-50%→浅绿, 50-75%→中绿, 75-85%→深绿, ≥85%→最深绿
const hmLevel = c => {
  const ratio = c.quota > 0 ? c.n / c.quota : c.n / 20;
  return ratio >= 0.85 ? 4 : ratio >= 0.75 ? 3 : ratio >= 0.5 ? 2 : ratio >= 0.3 ? 1 : "n";
};

function renderHeat(chart){
  const cells = chart.cells||{}, todayIso = chart.today;
  const today = new Date(todayIso+"T00:00:00");
  const CELL=12, GAP=3, STEP=CELL+GAP, TOP=14, LEFT=28;
  const MAX_COLS = 20;   // 固定列数，宽度恒为 28+20×15=328px
  // 从"本周周日"往前推 MAX_COLS-1 周，保证当前周是最后一列
  const thisSun = new Date(today);
  thisSun.setDate(today.getDate() - today.getDay());
  let start = new Date(thisSun);
  start.setDate(thisSun.getDate() - (MAX_COLS - 1) * 7);
  let rects="", months="", wi=0, lastM=-1;
  for (let d=new Date(start); d<=today && wi < MAX_COLS; wi++){
    const x = LEFT + wi*STEP;
    if (d.getMonth()!==lastM){ lastM=d.getMonth(); months+=`<text class="hm-label" x="${x}" y="9">${HM_MONTHS[lastM]}</text>`; }
    for (let di=0; di<7; di++){
      if (d<=today){
        const iso=fmtIso(d), c=cells[iso];
        const cls = c===undefined ? "hm-n" : "hm-"+hmLevel(c);
        const here = iso===todayIso ? " today" : "";
        const pct = c && c.quota > 0 ? Math.round(c.n/c.quota*100)+"%" : "";
        const tip = c===undefined ? `${iso} · 未做`
          : `${iso} · 完成 ${c.n}${c.quota>0?" / "+c.quota:""}题${pct?" ("+pct+")":""} · 正确率 ${c.acc}%`;
        rects += `<rect class="hm-d ${cls}${here}" x="${x}" y="${TOP+di*STEP}" width="${CELL}" height="${CELL}" rx="2"><title>${tip}</title></rect>`;
      }
      d.setDate(d.getDate()+1);
    }
  }
  const W=LEFT+wi*STEP, H=TOP+7*STEP;
  const wd=[["Mon",1],["Wed",3],["Fri",5]].map(([t,r])=>`<text class="hm-label" x="0" y="${TOP+r*STEP+9}">${t}</text>`).join("");
  return `<div class="heatwrap"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${months}${wd}${rects}</svg></div>`
    + `<div class="hm-legend" style="max-width:${W}px">少`
    + ` <i style="background:var(--hm-n)"></i>`
    + ` <i style="background:var(--hm-1)"></i><i style="background:var(--hm-2)"></i>`
    + ` <i style="background:var(--hm-3)"></i><i style="background:var(--hm-4)"></i> 多</div>`;
}
function renderRecent(chart){
  const rows = chart.recent||[];
  if (!rows.length) return "";
  let h = `<table class="recent"><tr><th>日期</th><th>题</th><th>正确率</th></tr>`;
  for (const r of rows){
    const trend = r.trend==="↑" ? "up" : r.trend==="↓" ? "down" : "";
    h += `<tr><td>${fmtMD(r.date)}</td><td class="num">${r.n}</td>`
       + `<td class="num ${trend}">${r.acc}%${r.trend ? " "+r.trend : ""}</td></tr>`;
  }
  return h + `</table>`;
}
function renderChart(chart){
  if (!chart || !chart.days)
    return `<div class="empty-s">还没坚持记录。做几天题后，这里出现热力图和近十天趋势。</div>`;
  return renderHeat(chart) + renderRecent(chart);
}

async function showStats(){
  inStats = true; paintStatsBtn();
  const dayCtx = curDay || TODAY_ISO;
  const dayLabel = curDay ? `${fmtMD(curDay)} 回顾` : "今日";
  renderDayTitle("战况诊断", dayLabel);
  if (!curDay) renderDayNav(DATA.prev, "");
  const feed = $("#feed");
  feed.innerHTML = `<div class="empty-s" style="padding:20px 0">加载中…</div>`;
  const st = await (await fetch("/api/stats?d="+encodeURIComponent(dayCtx))).json();
  feed.innerHTML = "";

  // 待攻克：该天答错的题 + 答对但标了没懂的题，按答题顺序
  const pending = st.pending_items || [];
  let remaining = pending.length;
  const pendingSect = document.createElement("div"); pendingSect.className = "sect";
  pendingSect.innerHTML = `<h3>待攻克（${remaining}）</h3>`;
  if (pending.length) {
    pending.forEach(m => {
      const card = document.createElement("section"); card.className = "qblock"; card.id = "stuck-"+m.id;
      // meta 行
      const meta = document.createElement("div"); meta.className = "qmeta";
      meta.innerHTML = `<b>${m.year}</b>　第 ${m.q} 题　<span class="done-tag">${m.subjectCN} · ${prettyCh(m.chapter)}</span>`;
      if (!m.day_ok) meta.innerHTML += `　<span class="done-tag no">答错</span>`;
      if (m.pick) meta.innerHTML += `　<span class="done-tag">你选了 ${m.pick}</span>`;
      if (m.diagnosis) meta.innerHTML += diagTag(m.diagnosis);
      if (m.day_ok && m.stuck && !m.diagnosis) meta.innerHTML += `　<span class="done-tag no">仍需攻克</span>`;
      card.appendChild(meta);
      // 题目图片
      const img = document.createElement("img"); img.className = "qimg";
      img.src = m.img; img.loading = "lazy";
      if (m.dispW) img.style.maxWidth = m.dispW + "px";
      card.appendChild(img);
      // 答对但猜的题：有「搞懂了」按钮可以从列表移除
      if (m.day_ok && m.stuck) {
        const fb = document.createElement("div"); fb.className = "fb";
        const btn = mkBtn("✓ 搞懂了", async () => {
          await unstick(m.id);
          card.remove();
          pendingSect.querySelector("h3").textContent = `待攻克（${--remaining}）`;
        });
        fb.appendChild(btn);
        card.appendChild(fb);
      }
      // 疑问口袋（可编辑，默认展开）
      card.appendChild(makePocket(m.id, m.notes, false, true));
      pendingSect.appendChild(card);
    });
  } else {
    pendingSect.innerHTML += `<div class="empty-s">该天没有待攻克的题 🎉</div>`;
  }
  feed.appendChild(pendingSect);
  window.scrollTo(0,0);
}
async function unstick(id){
  await fetch("/api/stuck",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, stuck:false})});
  document.getElementById("stuck-"+id)?.remove();
}

load().then(() => { if (location.hash === "#stats") showStats(); });

// 服务重启后自动 reload：轮询 /api/ping，时间戳变了就刷新页面
(function(){
  let known = null;
  setInterval(async () => {
    try {
      const r = await fetch("/api/ping", {cache:"no-store"});
      const {started} = await r.json();
      if (known === null) { known = started; return; }
      if (started !== known) location.reload();
    } catch(e) {}
  }, 3000);
})();
