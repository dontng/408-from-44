<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>408 刷题台</title>
<style>
:root{
  --bg:#f6f3ec; --paper:#fcfaf4; --ink:#34302a; --sub:#948c7d; --line:#e6dfd0;
  --akane:#a13c3c; --ai:#3c5a78; --moss:#5e7a58;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans GB","PingFang SC","Noto Sans CJK SC",sans-serif;
  font-size:15px;line-height:1.9;letter-spacing:.02em}
.layout{max-width:1080px;margin:0 auto;padding:28px 22px 90px;
  display:grid;grid-template-columns:230px 1fr;gap:38px}
@media(max-width:760px){.layout{grid-template-columns:1fr;gap:20px;padding:18px 16px 70px}}

/* ── 侧边栏 ── */
aside{position:sticky;top:28px;align-self:start}
@media(max-width:760px){aside{position:static}}
.kicker{font-size:10px;letter-spacing:.4em;color:var(--sub)}
.dday{font-family:Georgia,serif;margin:6px 0 2px}
.dday b{font-size:40px;color:var(--akane);font-weight:600}
.dday span{font-size:12px;color:var(--sub);letter-spacing:.2em}
.todaybar{margin:22px 0 12px;display:flex;align-items:baseline;gap:10px}
.todaybar h2{font-family:"Noto Serif CJK SC",serif;font-size:15px;letter-spacing:.2em}
.todaybar small{color:var(--sub);font-size:12px}
.qlist{list-style:none;max-height:62vh;overflow:auto}
@media(max-width:760px){.qlist{max-height:140px;display:flex;flex-wrap:wrap;gap:6px}}
.qlist li{display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:13px;color:var(--sub);
  border-bottom:1px solid #efe9dc;cursor:pointer}
@media(max-width:760px){.qlist li{border:1px solid var(--line);border-radius:4px;padding:3px 8px}}
.qlist li .dot{width:7px;height:7px;border-radius:50%;background:#cdc4b0;flex:none}
.qlist li.cur{color:var(--ink);font-weight:600}
.qlist li.cur .dot{background:var(--ai)}
.qlist li.ok .dot{background:var(--moss)} .qlist li.no .dot{background:var(--akane)}
.qlist li.done{color:#bcb4a4}

/* ── 主区 ── */
main{min-width:0}
.qmeta{font-size:11px;letter-spacing:.25em;color:var(--sub);margin-bottom:12px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px}
.card img{width:100%;display:block;border-radius:4px}
.opts{margin-top:20px;display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--paper);
  border:1px solid var(--line);border-radius:7px;cursor:pointer;transition:all .18s;font-size:16px}
.opt:hover{border-color:var(--ai)}
.opt .k{font-family:Georgia,serif;font-size:18px;font-weight:600;color:var(--sub);width:18px}
.opt.ok{background:var(--moss);border-color:var(--moss);color:#fff} .opt.ok .k{color:#fff}
.opt.no{background:var(--akane);border-color:var(--akane);color:#fff} .opt.no .k{color:#fff}
.opt.pick{outline:2px solid var(--ai)}
.feedback{margin-top:22px;display:flex;align-items:center;gap:16px;min-height:34px}
.verdict{font-family:"Noto Serif CJK SC",serif;font-size:18px;letter-spacing:.1em}
.verdict.ok{color:var(--moss)} .verdict.no{color:var(--akane)}
.selfjudge{color:var(--sub);font-size:14px}
button{font:inherit;font-size:13.5px;letter-spacing:.15em;cursor:pointer;
  padding:8px 24px;color:var(--ai);background:none;border:1px solid var(--ai);border-radius:5px;
  transition:all .2s}
button:hover{background:var(--ai);color:var(--paper)}
button.q{border-color:var(--line);color:var(--sub);padding:6px 16px}
.next{margin-left:auto}
.done-screen{text-align:center;padding:70px 20px;color:var(--sub)}
.done-screen h2{font-family:"Noto Serif CJK SC",serif;color:var(--ink);font-size:22px;letter-spacing:.1em;margin-bottom:12px}
footer{margin-top:60px;text-align:center;font-size:11px;color:#c4bcab;letter-spacing:.4em}
</style>
</head>
<body>
<div class="layout">
  <aside>
    <div class="kicker">408 · 真题刷题</div>
    <div class="dday"><b id="dday">—</b> <span>天后考试</span></div>
    <div class="todaybar">
      <h2>今日</h2><small id="todaystat">—</small>
    </div>
    <ul class="qlist" id="qlist"></ul>
  </aside>

  <main id="main"></main>
</div>
<footer>从混沌到清晰</footer>

<script>
let DATA = null;        // /api/today 返回
let cur = null;         // 当前题对象
let answered = false;

const $ = s => document.querySelector(s);

async function load(){
  DATA = await (await fetch("/api/today")).json();
  $("#dday").textContent = DATA.dday;
  renderSidebar();
  cur = DATA.items.find(it => it.status === "pending");
  renderMain();
}

function renderSidebar(){
  const total = DATA.items.length;
  $("#todaystat").textContent = `${DATA.done}/${total} 题　对 ${DATA.ok}`;
  const ul = $("#qlist"); ul.innerHTML = "";
  for (const it of DATA.items){
    const li = document.createElement("li");
    let cls = "";
    if (it.status === "done") cls = "done " + (it.ok ? "ok" : "no");
    if (cur && it.id === cur.id) cls += " cur";
    li.className = cls.trim();
    li.innerHTML = `<span class="dot"></span>${it.year} 第${it.q}题`;
    li.onclick = () => { if (it.status==="pending"){ cur = it; renderMain(); renderSidebar(); } };
    ul.appendChild(li);
  }
}

function renderMain(){
  answered = false;
  const m = $("#main");
  if (!cur){
    m.innerHTML = `<div class="done-screen"><h2>今天刷完了 🎉</h2>
      <p>共 ${DATA.done} 题，对 ${DATA.ok} 题（${DATA.done?Math.round(DATA.ok/DATA.done*100):0}%）</p>
      <p>错题会按 1/2/4/7/15 天的遗忘曲线再回来找你。</p></div>`;
    return;
  }
  m.innerHTML = `
    <div class="qmeta">${cur.year} 年 · 第 ${cur.q} 题</div>
    <div class="card"><img src="${cur.img}" alt="q${cur.q}"></div>
    <div class="opts" id="opts">
      ${["A","B","C","D"].map(o=>`<div class="opt" data-o="${o}"><span class="k">${o}</span><span>选项 ${o}</span></div>`).join("")}
    </div>
    <div class="feedback" id="feedback"></div>`;
  document.querySelectorAll(".opt").forEach(el=>{
    el.onclick = () => choose(el.dataset.o);
  });
}

async function choose(pick){
  if (answered) return;
  answered = true;
  const res = await (await fetch("/api/grade",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:cur.id, pick})})).json();

  if (!res.known){
    // 无官方答案 → 自判
    answered = false;
    document.querySelectorAll(".opt").forEach(el=>{
      if (el.dataset.o===pick) el.classList.add("pick");
    });
    $("#feedback").innerHTML = `<span class="selfjudge">这题对了吗？</span>
      <button class="q" id="sjok">✓ 对</button><button class="q" id="sjno">✗ 错</button>`;
    $("#sjok").onclick = ()=>selfjudge(true);
    $("#sjno").onclick = ()=>selfjudge(false);
    return;
  }
  showVerdict(pick, res.correct, res.answer);
}

async function selfjudge(ok){
  if (answered) return; answered = true;
  await fetch("/api/grade",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:cur.id, self:ok})});
  showVerdict(null, ok, null);
}

function showVerdict(pick, correct, answer){
  document.querySelectorAll(".opt").forEach(el=>{
    const o = el.dataset.o;
    if (answer && o===answer) el.classList.add("ok");
    else if (pick && o===pick && !correct) el.classList.add("no");
    el.onclick = null;
  });
  markDone(correct);
  $("#feedback").innerHTML =
    `<span class="verdict ${correct?'ok':'no'}">${correct?'答对':'答错'}${answer?'　正确答案 '+answer:''}</span>
     <button class="next" id="next">下一题 ›</button>`;
  $("#next").onclick = nextQ;
}

function markDone(correct){
  const it = DATA.items.find(x=>x.id===cur.id);
  if (it){ it.status="done"; it.ok=correct; }
  DATA.done += 1; if (correct) DATA.ok += 1;
  renderSidebar();
}

function nextQ(){
  cur = DATA.items.find(it => it.status === "pending");
  renderMain(); renderSidebar();
}

load();
</script>
</body>
</html>
